<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <rect width="400" height="300" fill="#000"/>

  <!-- Ring back (behind planet) -->
  <ellipse cx="200" cy="160" rx="155" ry="28"
    fill="none" stroke="#fff" stroke-width="18" opacity="0.15"/>
  <ellipse cx="200" cy="160" rx="140" ry="22"
    fill="none" stroke="#fff" stroke-width="8" opacity="0.25"/>
  <ellipse cx="200" cy="160" rx="125" ry="17"
    fill="none" stroke="#fff" stroke-width="5" opacity="0.35"/>

  <!-- Planet body -->
  <ellipse cx="200" cy="150" rx="85" ry="85" fill="#111"/>
  <ellipse cx="200" cy="150" rx="85" ry="85"
    fill="none" stroke="#fff" stroke-width="2" opacity="0.9"/>

  <!-- Planet surface bands -->
  <clipPath id="planet-clip">
    <ellipse cx="200" cy="150" rx="83" ry="83"/>
  </clipPath>
  <g clip-path="url(#planet-clip)">
    <ellipse cx="200" cy="118" rx="83" ry="10" fill="#fff" opacity="0.07"/>
    <ellipse cx="200" cy="133" rx="83" ry="7"  fill="#fff" opacity="0.05"/>
    <ellipse cx="200" cy="150" rx="83" ry="9"  fill="#fff" opacity="0.09"/>
    <ellipse cx="200" cy="166" rx="83" ry="6"  fill="#fff" opacity="0.06"/>
    <ellipse cx="200" cy="180" rx="83" ry="8"  fill="#fff" opacity="0.05"/>

    <!-- Highlight -->
    <ellipse cx="170" cy="115" rx="30" ry="20" fill="#fff" opacity="0.08"/>
  </g>

  <!-- Ring front (over planet) — clip to lower half -->
  <clipPath id="ring-front-clip">
    <rect x="0" y="158" width="400" height="142"/>
  </clipPath>
  <g clip-path="url(#ring-front-clip)">
    <ellipse cx="200" cy="160" rx="155" ry="28"
      fill="none" stroke="#fff" stroke-width="18" opacity="0.55"/>
    <ellipse cx="200" cy="160" rx="140" ry="22"
      fill="none" stroke="#111" stroke-width="6"/>
    <ellipse cx="200" cy="160" rx="125" ry="17"
      fill="none" stroke="#fff" stroke-width="5" opacity="0.65"/>
    <ellipse cx="200" cy="160" rx="112" ry="13"
      fill="none" stroke="#111" stroke-width="4"/>
  </g>
</svg>
