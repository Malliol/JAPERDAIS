<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JAPERDAIS — Отношения</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #f0efe9;
  font-family: 'Courier New', monospace;
  overflow: hidden;
  color: #222;
}

#canvas { display: block; }

/* ── sidebar ── */
#sidebar {
  position: fixed;
  top: 0; right: 0;
  width: 300px; height: 100vh;
  background: rgba(240,239,233,0.98);
  border-left: 1px solid #ddd;
  padding: 28px 24px;
  transform: translateX(100%);
  transition: transform .35s cubic-bezier(.4,0,.2,1);
  overflow-y: auto;
  z-index: 50;
}
#sidebar.open { transform: translateX(0); }

#sb-name {
  font-size: 20px;
  color: #111;
  letter-spacing: 2px;
  margin-bottom: 4px;
}
#sb-role {
  font-size: 10px;
  color: #999;
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 6px;
}
#sb-spectrum {
  font-size: 10px;
  color: #b07d00;
  margin-bottom: 24px;
  padding-bottom: 20px;
  border-bottom: 1px solid #ddd;
}

#sb-relations h3 {
  font-size: 9px;
  letter-spacing: 3px;
  color: #bbb;
  text-transform: uppercase;
  margin-bottom: 12px;
}

.rel-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  margin-bottom: 12px;
  font-size: 11px;
  line-height: 1.5;
}
.rel-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 4px;
}
.rel-dot.pos  { background: #00aa55; }
.rel-dot.neg  { background: #dd2244; }
.rel-dot.neu  { background: #aaa; }
.rel-dot.envy { background: #cc9900; }
.rel-name { color: #111; font-size: 10px; }
.rel-desc { color: #999; font-size: 10px; }

#sb-close {
  position: absolute;
  top: 20px; right: 20px;
  background: none; border: none;
  color: #bbb; font-size: 18px;
  cursor: pointer; line-height: 1;
}
#sb-close:hover { color: #000; }

/* ── header ── */
#hdr {
  position: fixed;
  top: 0; left: 0;
  padding: 16px 24px;
  z-index: 40;
  pointer-events: none;
}
#hdr h1 {
  font-size: 11px;
  letter-spacing: 5px;
  color: #bbb;
  font-weight: normal;
}

/* ── legend ── */
#legend {
  position: fixed;
  bottom: 24px; left: 24px;
  z-index: 40;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.leg { display:flex; align-items:center; gap:8px; font-size:9px; color:#aaa; letter-spacing:2px; cursor:pointer; transition: color .2s; }
.leg:hover { color: #333; }
.leg.off { opacity: .2; }
.leg-line { width: 24px; height: 1.5px; }
.leg-line.pos  { background: #1a9950; }
.leg-line.neg  { background: #cc1133; }
.leg-line.neu  { background: none; border-top: 2px dashed #888; height:0; }
.leg-line.envy { background: none; border-top: 2px dashed #c48a00; height:0; }

/* ── tooltip ── */
#tip {
  position: fixed;
  background: #fff;
  border: 1px solid #ddd;
  padding: 8px 12px;
  font-size: 10px;
  color: #666;
  pointer-events: none;
  display: none;
  z-index: 100;
  letter-spacing: 1px;
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="hdr"><h1>JAPERDAIS · ДИАГРАММА ОТНОШЕНИЙ</h1></div>

<div id="legend">
  <div class="leg" data-type="pos"><div class="leg-line pos"></div>ПОЛОЖИТЕЛЬНО</div>
  <div class="leg" data-type="neg"><div class="leg-line neg"></div>НЕГАТИВНО</div>
  <div class="leg" data-type="neu"><div class="leg-line neu"></div>НЕЙТРАЛЬНО</div>
  <div class="leg" data-type="envy"><div class="leg-line envy"></div>ЗАВИСТЬ</div>
</div>

<div id="sidebar">
  <button id="sb-close">×</button>
  <div id="sb-name"></div>
  <div id="sb-role"></div>
  <div id="sb-spectrum"></div>
  <div id="sb-relations"></div>
</div>

<div id="tip"></div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H, cx, cy, radius;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W / 2;
  cy = H / 2;
  radius = Math.min(W, H) * 0.34;
  draw();
}

// ── data ──
const NODES = [
  { id:'kreono',   name:'Креоно',      role:'Капитан',             spectrum:'Ответственность — Гиперконтроль' },
  { id:'saida',    name:'Саида',       role:'Офицер безопасности', spectrum:'Выдержка — Ярость' },
  { id:'erkul',    name:'Эркюль',      role:'Аналитик',            spectrum:'Баланс — Одержимость' },
  { id:'evgeny',   name:'Евгений',     role:'Геолог',              spectrum:'Вера — Разочарование' },
  { id:'unura',    name:'Унурцэцэг',   role:'Биолог',              spectrum:'Самообладание — Истерика' },
  { id:'katerina', name:'Катерина',    role:'Медик',               spectrum:'Восстановление — Разрушение' },
  { id:'jurgen',   name:'Юрген',       role:'Инженер',             spectrum:'Надежда — Отчаяние' },
  { id:'logan',    name:'Логан',       role:'Сисадмин',            spectrum:'Принятие — Отрицание' },
  { id:'silvia',   name:'Сильвия',     role:'Навигатор',           spectrum:'Стратегия — Случайность' },
  { id:'patricio', name:'Патрицио',    role:'Оценщик',             spectrum:'Целостность — Растворение' },
  { id:'markus',   name:'Маркус',      role:'Разведчик',           spectrum:'Отвага — Паранойя' },
  { id:'kan_so',   name:'Кан Со',      role:'Разведчик',           spectrum:'Пассивность — Холод' },
];

// relationships: { from, to, type, label }
const LINKS = [
  // Саида
  { from:'saida', to:'kreono',   type:'neg',  label:'плохой капитан' },
  { from:'saida', to:'erkul',    type:'neg',  label:'слабак' },
  { from:'saida', to:'evgeny',   type:'neu',  label:'безвольный' },
  { from:'saida', to:'unura',    type:'neg',  label:'истеричка' },
  { from:'saida', to:'katerina', type:'neu',  label:'нестабильная' },
  { from:'saida', to:'jurgen',   type:'neu',  label:'тюфяк' },
  { from:'saida', to:'logan',    type:'neg',  label:'безответственный' },
  { from:'saida', to:'silvia',   type:'pos',  label:'сильный стратег' },
  { from:'saida', to:'markus',   type:'neg',  label:'трус' },
  { from:'saida', to:'kan_so',   type:'neu',  label:'что-то скрывает' },
  { from:'saida', to:'patricio', type:'neu',  label:'что-то не так' },
  // Эркюль
  { from:'erkul', to:'kreono',   type:'neu',  label:'нейтрально' },
  { from:'erkul', to:'saida',    type:'neu',  label:'уважаю, но резка' },
  { from:'erkul', to:'evgeny',   type:'pos',  label:'добрый, приятный' },
  { from:'erkul', to:'unura',    type:'neg',  label:'верит в лженауку' },
  { from:'erkul', to:'katerina', type:'neu',  label:'непредсказуемая' },
  { from:'erkul', to:'jurgen',   type:'neu',  label:'спокойный' },
  { from:'erkul', to:'logan',    type:'neg',  label:'нигилист' },
  { from:'erkul', to:'silvia',   type:'neu',  label:'конфликт стратегий' },
  { from:'erkul', to:'patricio', type:'neu',  label:'сложно воспринимать' },
  { from:'erkul', to:'markus',   type:'neu',  label:'сложно воспринимать' },
  { from:'erkul', to:'kan_so',   type:'pos',  label:'уважаю спокойствие' },
  // Евгений
  { from:'evgeny', to:'kreono',   type:'pos',  label:'хороший собутыльник' },
  { from:'evgeny', to:'saida',    type:'neu',  label:'надеюсь откроется' },
  { from:'evgeny', to:'erkul',    type:'pos',  label:'гений во плоти!' },
  { from:'evgeny', to:'unura',    type:'pos',  label:'обаятельная!' },
  { from:'evgeny', to:'katerina', type:'pos',  label:'спасительница наша' },
  { from:'evgeny', to:'jurgen',   type:'pos',  label:'котёночек' },
  { from:'evgeny', to:'logan',    type:'neu',  label:'тяжело, но пытаюсь' },
  { from:'evgeny', to:'silvia',   type:'pos',  label:'умна и красива' },
  { from:'evgeny', to:'patricio', type:'neu',  label:'не понимаю' },
  { from:'evgeny', to:'markus',   type:'pos',  label:'куражный!' },
  { from:'evgeny', to:'kan_so',   type:'neu',  label:'побаиваюсь' },
  // Креоно
  { from:'kreono', to:'saida',    type:'envy', label:'завидует авторитету' },
  { from:'kreono', to:'erkul',    type:'envy', label:'завидует продуктивности' },
  { from:'kreono', to:'evgeny',   type:'pos',  label:'хороший малый' },
  { from:'kreono', to:'unura',    type:'neg',  label:'пустышка' },
  { from:'kreono', to:'katerina', type:'neu',  label:'двоякое' },
  { from:'kreono', to:'jurgen',   type:'neg',  label:'жуткий тип' },
  { from:'kreono', to:'logan',    type:'neg',  label:'распиздяй' },
  { from:'kreono', to:'silvia',   type:'envy', label:'завидует идеям' },
  { from:'kreono', to:'patricio', type:'neu',  label:'странный, не опасен' },
  { from:'kreono', to:'markus',   type:'envy', label:'завидует харизме' },
  { from:'kreono', to:'kan_so',   type:'envy', label:'завидует спокойствию' },
];

const COLORS = {
  pos:  '#1a9950',
  neg:  '#cc1133',
  neu:  '#888',
  envy: '#c48a00',
};

// index nodes
const nodeMap = {};
NODES.forEach(n => nodeMap[n.id] = n);

// build outgoing map for sidebar
const outgoing = {};
const incoming = {};
NODES.forEach(n => { outgoing[n.id] = []; incoming[n.id] = []; });
LINKS.forEach(l => {
  outgoing[l.from].push(l);
  incoming[l.to].push(l);
});

// positions (set after resize)
let hiddenTypes = new Set();
let focusedId = null;
let hoveredNode = null;
let hoveredEdge = null;

function positionNodes() {
  NODES.forEach((n, i) => {
    const angle = (i / NODES.length) * 2 * Math.PI - Math.PI / 2;
    n.x = cx + radius * Math.cos(angle);
    n.y = cy + radius * Math.sin(angle);
  });
}

// ── drawing ──
function edgeAlpha(link) {
  if (hiddenTypes.has(link.type)) return 0;
  if (focusedId) {
    if (link.from !== focusedId && link.to !== focusedId) return 0.04;
  }
  return link.type === 'neu' ? 0.7 : 1.0;
}

function nodeAlpha(node) {
  if (!focusedId) return 1;
  if (node.id === focusedId) return 1;
  const connected = LINKS.some(l => (l.from === focusedId && l.to === node.id) || (l.to === focusedId && l.from === node.id));
  return connected ? 0.9 : 0.15;
}

// set of pairs that have arrows in both directions
const BIDIRECTIONAL = new Set();
LINKS.forEach(a => {
  LINKS.forEach(b => {
    if (a.from === b.to && a.to === b.from) {
      BIDIRECTIONAL.add(`${a.from}->${a.to}`);
    }
  });
});

function drawArrow(x1, y1, x2, y2, color, alpha, dashed, link) {
  const dx = x2 - x1, dy = y2 - y1;
  const dist = Math.sqrt(dx*dx + dy*dy);
  if (dist < 1) return;
  const ux = dx/dist, uy = dy/dist;
  const nodeR = 32;
  const sx = x1 + ux * nodeR, sy = y1 + uy * nodeR;
  const ex = x2 - ux * nodeR, ey = y2 - uy * nodeR;

  // if bidirectional pair: bend away from center; else slight fixed curve
  const mx = (sx + ex) / 2, my = (sy + ey) / 2;
  const isBi = link && BIDIRECTIONAL.has(`${link.from}->${link.to}`);
  // perpendicular always points "left" of direction
  const perp = { x: -uy, y: ux };
  // for bidirectional edges bend more; for single edges bend slightly
  const bend = isBi ? dist * 0.22 : dist * 0.08;
  const cpx = mx + perp.x * bend, cpy = my + perp.y * bend;

  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.strokeStyle = color;
  const ltype = link ? link.type : '';
  ctx.lineWidth = ltype === 'neu' ? 1.3 : 2;
  ctx.shadowColor = 'transparent';
  ctx.shadowBlur = 0;
  if (ltype === 'neu')       ctx.setLineDash([4, 4]);
  else if (ltype === 'envy') ctx.setLineDash([6, 4]);
  else                       ctx.setLineDash([]);

  ctx.beginPath();
  ctx.moveTo(sx, sy);
  ctx.quadraticCurveTo(cpx, cpy, ex, ey);
  ctx.stroke();

  // arrowhead
  const t = 0.9;
  const ax = (1-t)*(1-t)*sx + 2*(1-t)*t*cpx + t*t*ex;
  const ay = (1-t)*(1-t)*sy + 2*(1-t)*t*cpy + t*t*ey;
  const tang = { x: ex - ax, y: ey - ay };
  const tlen = Math.sqrt(tang.x**2 + tang.y**2);
  const tx = tang.x/tlen, ty = tang.y/tlen;
  const arrSize = 7;
  ctx.setLineDash([]);
  ctx.beginPath();
  ctx.moveTo(ex, ey);
  ctx.lineTo(ex - arrSize*tx + arrSize*0.4*(-ty), ey - arrSize*ty + arrSize*0.4*tx);
  ctx.lineTo(ex - arrSize*tx - arrSize*0.4*(-ty), ey - arrSize*ty - arrSize*0.4*tx);
  ctx.closePath();
  ctx.fillStyle = color;
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.restore();
}

function draw() {
  positionNodes();
  ctx.clearRect(0, 0, W, H);

  // background
  const bg = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(W,H)*0.75);
  bg.addColorStop(0, '#faf9f4');
  bg.addColorStop(1, '#e4e0d4');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // edges
  LINKS.forEach(link => {
    const a = edgeAlpha(link);
    if (a <= 0) return;
    const from = nodeMap[link.from], to = nodeMap[link.to];
    drawArrow(from.x, from.y, to.x, to.y, COLORS[link.type], a, link.type === 'envy', link);
  });

  // nodes
  NODES.forEach(n => {
    const a = nodeAlpha(n);
    const focused = n.id === focusedId;
    const hovered = n === hoveredNode;

    ctx.save();
    ctx.globalAlpha = a;

    // drop shadow always
    ctx.shadowColor = 'rgba(0,0,0,0.13)';
    ctx.shadowBlur = focused ? 18 : 8;
    ctx.shadowOffsetX = 0;
    ctx.shadowOffsetY = focused ? 4 : 2;

    // circle bg
    ctx.beginPath();
    ctx.arc(n.x, n.y, 32, 0, Math.PI * 2);
    ctx.fillStyle = focused ? '#fff' : (hovered ? '#fff' : '#f8f7f2');
    ctx.fill();
    ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;
    ctx.strokeStyle = focused ? '#222' : (hovered ? '#555' : '#c8c4b8');
    ctx.lineWidth = focused ? 2 : 1.5;
    ctx.stroke();

    // name
    ctx.fillStyle = a > 0.5 ? '#111' : '#ccc';
    ctx.font = `${focused ? 'bold ' : ''}12px "Courier New"`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(n.name, n.x, n.y - 6);

    // role
    ctx.fillStyle = a > 0.5 ? '#555' : '#ddd';
    ctx.font = '8px "Courier New"';
    ctx.fillText(n.role, n.x, n.y + 9);

    ctx.restore();
  });
}

// ── interaction ──
function getNodeAt(mx, my) {
  for (const n of NODES) {
    const dx = mx - n.x, dy = my - n.y;
    if (dx*dx + dy*dy < 32*32) return n;
  }
  return null;
}

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  const node = getNodeAt(mx, my);
  hoveredNode = node;

  const tip = document.getElementById('tip');
  if (node) {
    canvas.style.cursor = 'pointer';
    tip.style.display = 'block';
    tip.style.left = (e.clientX + 14) + 'px';
    tip.style.top  = (e.clientY - 10) + 'px';
    tip.textContent = node.spectrum;
  } else {
    canvas.style.cursor = 'default';
    tip.style.display = 'none';
  }
  draw();
});

canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  const node = getNodeAt(mx, my);
  if (node) {
    if (focusedId === node.id) {
      focusedId = null;
      closeSidebar();
    } else {
      focusedId = node.id;
      openSidebar(node);
    }
  } else {
    focusedId = null;
    closeSidebar();
  }
  draw();
});

canvas.addEventListener('mouseleave', () => {
  hoveredNode = null;
  document.getElementById('tip').style.display = 'none';
  draw();
});

// ── sidebar ──
function openSidebar(node) {
  document.getElementById('sb-name').textContent = node.name;
  document.getElementById('sb-role').textContent = node.role;
  document.getElementById('sb-spectrum').textContent = node.spectrum;

  const out = outgoing[node.id];
  const inc = incoming[node.id];

  let html = '';
  if (out.length) {
    html += `<h3>КАК ОТНОСИТСЯ К ДРУГИМ</h3>`;
    out.forEach(l => {
      const target = nodeMap[l.to];
      html += `<div class="rel-item">
        <div class="rel-dot ${l.type}"></div>
        <div><div class="rel-name">${target.name}</div><div class="rel-desc">${l.label}</div></div>
      </div>`;
    });
  }
  if (inc.length) {
    html += `<br><h3>КАК ДРУГИЕ ОТНОСЯТСЯ</h3>`;
    inc.forEach(l => {
      const src = nodeMap[l.from];
      html += `<div class="rel-item">
        <div class="rel-dot ${l.type}"></div>
        <div><div class="rel-name">${src.name}</div><div class="rel-desc">${l.label}</div></div>
      </div>`;
    });
  }

  document.getElementById('sb-relations').innerHTML = html;
  document.getElementById('sidebar').classList.add('open');
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
}

document.getElementById('sb-close').addEventListener('click', () => {
  focusedId = null;
  closeSidebar();
  draw();
});

// ── legend toggle ──
document.querySelectorAll('.leg').forEach(el => {
  el.addEventListener('click', () => {
    const t = el.dataset.type;
    if (hiddenTypes.has(t)) { hiddenTypes.delete(t); el.classList.remove('off'); }
    else { hiddenTypes.add(t); el.classList.add('off'); }
    draw();
  });
});

window.addEventListener('resize', resize);
resize();
</script>
</body>
</html>
