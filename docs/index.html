<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JAPERDAIS — Диаграмма отношений</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    color: #eee;
    font-family: 'Courier New', monospace;
    overflow: hidden;
  }

  #header {
    position: fixed;
    top: 0; left: 0; right: 0;
    padding: 12px 20px;
    background: rgba(10,10,10,0.95);
    border-bottom: 1px solid #222;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 24px;
  }

  #header h1 {
    font-size: 14px;
    letter-spacing: 4px;
    font-weight: normal;
    color: #fff;
  }

  .legend {
    display: flex;
    gap: 16px;
    font-size: 11px;
    color: #666;
  }

  .legend-item { display: flex; align-items: center; gap: 6px; cursor: pointer; transition: color .2s; }
  .legend-item:hover { color: #ccc; }
  .legend-item.muted { opacity: 0.3; }

  .dot {
    width: 8px; height: 8px; border-radius: 50%;
  }
  .dot.pos { background: #7fff7f; }
  .dot.neg { background: #ff6b6b; }
  .dot.neu { background: #888; }
  .dot.envy { background: #ffd700; }

  #hint {
    position: fixed;
    bottom: 16px; left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    color: #333;
    letter-spacing: 2px;
    pointer-events: none;
  }

  #tooltip {
    position: fixed;
    background: rgba(10,10,10,0.95);
    border: 1px solid #333;
    padding: 10px 14px;
    font-size: 11px;
    line-height: 1.7;
    color: #ccc;
    pointer-events: none;
    max-width: 260px;
    display: none;
    z-index: 200;
  }

  #tooltip .tip-name { color: #fff; font-size: 13px; margin-bottom: 4px; }
  #tooltip .tip-role { color: #666; font-size: 10px; margin-bottom: 6px; letter-spacing: 1px; }
  #tooltip .tip-spectrum { color: #ffd700; font-size: 10px; }

  svg { display: block; }

  .node circle {
    cursor: grab;
    stroke-width: 1.5;
    transition: r .2s;
  }
  .node circle:active { cursor: grabbing; }
  .node.highlighted circle { stroke-width: 3; }

  .node text.name {
    font-size: 11px;
    font-family: 'Courier New', monospace;
    fill: #fff;
    pointer-events: none;
    text-anchor: middle;
  }

  .node text.role {
    font-size: 8.5px;
    font-family: 'Courier New', monospace;
    fill: #555;
    pointer-events: none;
    text-anchor: middle;
  }

  .link {
    fill: none;
    stroke-width: 1.5;
    opacity: 0.7;
  }
  .link.pos { stroke: #7fff7f; }
  .link.neg { stroke: #ff6b6b; }
  .link.neu { stroke: #555; }
  .link.envy { stroke: #ffd700; stroke-dasharray: 5,3; }
  .link.muted { opacity: 0.05; }

  .link-label {
    font-size: 8px;
    font-family: 'Courier New', monospace;
    fill: #444;
    pointer-events: none;
  }

  marker path { }
</style>
</head>
<body>

<div id="header">
  <h1>JAPERDAIS · ОТНОШЕНИЯ</h1>
  <div class="legend">
    <div class="legend-item" data-type="pos"><div class="dot pos"></div>положительно</div>
    <div class="legend-item" data-type="neg"><div class="dot neg"></div>негативно</div>
    <div class="legend-item" data-type="neu"><div class="dot neu"></div>нейтрально</div>
    <div class="legend-item" data-type="envy"><div class="dot envy"></div>зависть</div>
  </div>
</div>

<div id="tooltip"></div>
<div id="hint">ПЕРЕТАСКИВАЙ · НАВОДИ · КЛИК ДЛЯ ФОКУСА</div>

<svg id="svg"></svg>

<script>
const W = window.innerWidth, H = window.innerHeight;
const svg = d3.select('#svg').attr('width', W).attr('height', H);

// ── defs: arrow markers ──
const defs = svg.append('defs');
[
  { id: 'arr-pos', color: '#7fff7f' },
  { id: 'arr-neg', color: '#ff6b6b' },
  { id: 'arr-neu', color: '#555'    },
  { id: 'arr-envy',color: '#ffd700' },
].forEach(m => {
  defs.append('marker')
    .attr('id', m.id)
    .attr('viewBox', '0 -4 10 8')
    .attr('refX', 28).attr('refY', 0)
    .attr('markerWidth', 6).attr('markerHeight', 6)
    .attr('orient', 'auto')
    .append('path')
    .attr('d', 'M0,-4L10,0L0,4')
    .attr('fill', m.color);
});

// ── data ──
const nodes = [
  { id: 'kreono',   name: 'Креоно',    role: 'Капитан',          spectrum: 'Ответственность — Гиперконтроль' },
  { id: 'saida',    name: 'Саида',     role: 'Офицер безопасности', spectrum: 'Выдержка — Ярость' },
  { id: 'erkul',    name: 'Эркюль',    role: 'Аналитик',         spectrum: 'Баланс — Одержимость' },
  { id: 'evgeny',   name: 'Евгений',   role: 'Геолог',           spectrum: 'Вера — Разочарование' },
  { id: 'unura',    name: 'Унурцэцэг', role: 'Биолог',           spectrum: 'Самообладание — Истерика' },
  { id: 'katerina', name: 'Катерина',  role: 'Медик',            spectrum: 'Восстановление — Разрушение' },
  { id: 'jurgen',   name: 'Юрген',     role: 'Инженер',          spectrum: 'Надежда — Отчаяние' },
  { id: 'logan',    name: 'Логан',     role: 'Сисадмин',         spectrum: 'Принятие — Отрицание' },
  { id: 'silvia',   name: 'Сильвия',   role: 'Навигатор',        spectrum: 'Стратегия — Случайность' },
  { id: 'patricio', name: 'Патрицио',  role: 'Оценщик ресурсов', spectrum: 'Целостность — Растворение' },
  { id: 'markus',   name: 'Маркус',    role: 'Разведчик',        spectrum: 'Отвага — Паранойя' },
  { id: 'kan_so',   name: 'Кан Со',    role: 'Разведчик',        spectrum: 'Пассивность — Холод' },
];

// type: pos / neg / neu / envy
// label: short text on the arrow
const links = [
  // Саида →
  { source: 'saida',   target: 'kreono',   type: 'neg',  label: 'плохой капитан' },
  { source: 'saida',   target: 'erkul',    type: 'neg',  label: 'слабак' },
  { source: 'saida',   target: 'evgeny',   type: 'neu',  label: 'безвольный' },
  { source: 'saida',   target: 'unura',    type: 'neg',  label: 'истеричка' },
  { source: 'saida',   target: 'katerina', type: 'neu',  label: 'нестабильная' },
  { source: 'saida',   target: 'jurgen',   type: 'neu',  label: 'тюфяк' },
  { source: 'saida',   target: 'logan',    type: 'neg',  label: 'безответственный' },
  { source: 'saida',   target: 'silvia',   type: 'pos',  label: 'сильный стратег' },
  { source: 'saida',   target: 'markus',   type: 'neg',  label: 'трус' },
  { source: 'saida',   target: 'kan_so',   type: 'neu',  label: 'что-то скрывает' },
  { source: 'saida',   target: 'patricio', type: 'neu',  label: 'что-то не так' },

  // Эркюль →
  { source: 'erkul',   target: 'kreono',   type: 'neu',  label: 'нейтрально' },
  { source: 'erkul',   target: 'saida',    type: 'neu',  label: 'уважаю, но резка' },
  { source: 'erkul',   target: 'evgeny',   type: 'pos',  label: 'добрый, приятный' },
  { source: 'erkul',   target: 'unura',    type: 'neg',  label: 'верит в лженауку' },
  { source: 'erkul',   target: 'katerina', type: 'neu',  label: 'непредсказуемая' },
  { source: 'erkul',   target: 'jurgen',   type: 'neu',  label: 'спокойный' },
  { source: 'erkul',   target: 'logan',    type: 'neg',  label: 'нигилист' },
  { source: 'erkul',   target: 'silvia',   type: 'neu',  label: 'конфликт стратегий' },
  { source: 'erkul',   target: 'patricio', type: 'neu',  label: 'сложно воспринимать' },
  { source: 'erkul',   target: 'markus',   type: 'neu',  label: 'сложно воспринимать' },
  { source: 'erkul',   target: 'kan_so',   type: 'pos',  label: 'уважаю спокойствие' },

  // Евгений →
  { source: 'evgeny',  target: 'kreono',   type: 'pos',  label: 'хороший собутыльник' },
  { source: 'evgeny',  target: 'saida',    type: 'neu',  label: 'надеюсь откроется' },
  { source: 'evgeny',  target: 'erkul',    type: 'pos',  label: 'гений во плоти!' },
  { source: 'evgeny',  target: 'unura',    type: 'pos',  label: 'обаятельная!' },
  { source: 'evgeny',  target: 'katerina', type: 'pos',  label: 'спасительница наша' },
  { source: 'evgeny',  target: 'jurgen',   type: 'pos',  label: 'котёночек' },
  { source: 'evgeny',  target: 'logan',    type: 'neu',  label: 'тяжело, но пытаюсь' },
  { source: 'evgeny',  target: 'silvia',   type: 'pos',  label: 'умна и красива' },
  { source: 'evgeny',  target: 'patricio', type: 'neu',  label: 'не понимаю' },
  { source: 'evgeny',  target: 'markus',   type: 'pos',  label: 'куражный!' },
  { source: 'evgeny',  target: 'kan_so',   type: 'neu',  label: 'побаиваюсь' },

  // Креоно →
  { source: 'kreono',  target: 'saida',    type: 'envy', label: 'завидует авторитету' },
  { source: 'kreono',  target: 'erkul',    type: 'envy', label: 'завидует продуктивности' },
  { source: 'kreono',  target: 'evgeny',   type: 'pos',  label: 'хороший малый' },
  { source: 'kreono',  target: 'unura',    type: 'neg',  label: 'пустышка' },
  { source: 'kreono',  target: 'katerina', type: 'neu',  label: 'двоякое' },
  { source: 'kreono',  target: 'jurgen',   type: 'neg',  label: 'жуткий тип' },
  { source: 'kreono',  target: 'logan',    type: 'neg',  label: 'распиздяй' },
  { source: 'kreono',  target: 'silvia',   type: 'envy', label: 'завидует идеям' },
  { source: 'kreono',  target: 'patricio', type: 'neu',  label: 'странный, не опасен' },
  { source: 'kreono',  target: 'markus',   type: 'envy', label: 'завидует харизме' },
  { source: 'kreono',  target: 'kan_so',   type: 'envy', label: 'завидует спокойствию' },
];

// ── layout ──
const cx = W / 2, cy = H / 2 + 20;
const r = Math.min(W, H) * 0.36;
nodes.forEach((n, i) => {
  const angle = (i / nodes.length) * 2 * Math.PI - Math.PI / 2;
  n.x = cx + r * Math.cos(angle);
  n.y = cy + r * Math.sin(angle);
});

// ── simulation ──
const sim = d3.forceSimulation(nodes)
  .force('link', d3.forceLink(links).id(d => d.id).distance(180).strength(0.1))
  .force('charge', d3.forceManyBody().strength(-400))
  .force('center', d3.forceCenter(cx, cy))
  .force('collision', d3.forceCollide(55));

// ── draw links ──
const linkGroup = svg.append('g').attr('class', 'links');
const linkSel = linkGroup.selectAll('path')
  .data(links)
  .join('path')
  .attr('class', d => `link ${d.type}`)
  .attr('marker-end', d => `url(#arr-${d.type})`);

// link labels
const linkLabelSel = svg.append('g').selectAll('text')
  .data(links)
  .join('text')
  .attr('class', 'link-label')
  .text(d => d.label);

// ── draw nodes ──
const tip = document.getElementById('tooltip');

const nodeSel = svg.append('g').selectAll('g')
  .data(nodes)
  .join('g')
  .attr('class', 'node')
  .call(d3.drag()
    .on('start', (e, d) => { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
    .on('drag',  (e, d) => { d.fx = e.x; d.fy = e.y; })
    .on('end',   (e, d) => { if (!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; })
  )
  .on('mouseover', (e, d) => {
    tip.style.display = 'block';
    tip.innerHTML = `<div class="tip-name">${d.name}</div><div class="tip-role">${d.role}</div><div class="tip-spectrum">${d.spectrum}</div>`;
  })
  .on('mousemove', e => {
    tip.style.left = (e.clientX + 14) + 'px';
    tip.style.top  = (e.clientY - 10) + 'px';
  })
  .on('mouseout', () => { tip.style.display = 'none'; })
  .on('click', (e, d) => focusNode(d.id));

nodeSel.append('circle')
  .attr('r', 24)
  .attr('fill', '#111')
  .attr('stroke', '#333');

nodeSel.append('text')
  .attr('class', 'name')
  .attr('dy', '0.35em')
  .text(d => d.name);

nodeSel.append('text')
  .attr('class', 'role')
  .attr('dy', '1.6em')
  .text(d => d.role);

// ── tick ──
function linkArc(d) {
  const dx = d.target.x - d.source.x;
  const dy = d.target.y - d.source.y;
  const dr = Math.sqrt(dx*dx + dy*dy) * 1.4;
  return `M${d.source.x},${d.source.y}A${dr},${dr} 0 0,1 ${d.target.x},${d.target.y}`;
}

sim.on('tick', () => {
  linkSel.attr('d', linkArc);

  linkLabelSel
    .attr('x', d => (d.source.x + d.target.x) / 2)
    .attr('y', d => (d.source.y + d.target.y) / 2);

  nodeSel.attr('transform', d => `translate(${d.x},${d.y})`);
});

// ── focus mode ──
let focusedId = null;
function focusNode(id) {
  if (focusedId === id) {
    focusedId = null;
    linkSel.classed('muted', false);
    nodeSel.classed('highlighted', false);
  } else {
    focusedId = id;
    const connected = new Set([id]);
    links.forEach(l => {
      const s = typeof l.source === 'object' ? l.source.id : l.source;
      const t = typeof l.target === 'object' ? l.target.id : l.target;
      if (s === id || t === id) { connected.add(s); connected.add(t); }
    });
    linkSel.classed('muted', d => {
      const s = typeof d.source === 'object' ? d.source.id : d.source;
      const t = typeof d.target === 'object' ? d.target.id : d.target;
      return s !== id && t !== id;
    });
    nodeSel.classed('highlighted', d => connected.has(d.id));
  }
}

// ── legend filter ──
let hidden = new Set();
document.querySelectorAll('.legend-item').forEach(el => {
  el.addEventListener('click', () => {
    const t = el.dataset.type;
    if (hidden.has(t)) { hidden.delete(t); el.classList.remove('muted'); }
    else               { hidden.add(t);    el.classList.add('muted'); }
    linkSel.style('display', d => hidden.has(d.type) ? 'none' : null);
    linkLabelSel.style('display', d => hidden.has(d.type) ? 'none' : null);
  });
});

// ── resize ──
window.addEventListener('resize', () => {
  const w = window.innerWidth, h = window.innerHeight;
  svg.attr('width', w).attr('height', h);
  sim.force('center', d3.forceCenter(w/2, h/2)).alpha(0.3).restart();
});
</script>
</body>
</html>
